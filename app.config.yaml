# MVP MCP server — pattern from https://github.com/adobe/generator-app-remote-mcp-server-generic
application:
  actions: actions
  web: web-src
  runtimeManifest:
    packages:
      mcp-app:
        license: Apache-2.0
        inputs:
          LOG_LEVEL: $LOG_LEVEL
        actions:
          mcp-server:
            function: actions/mcp-server/index.js
            web: "yes"
            runtime: nodejs:22
            limits:
              timeout: 300000
              memory: 512
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
              raw-http: true
