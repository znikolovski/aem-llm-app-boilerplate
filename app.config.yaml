application:
  actions: actions
  web: web-src
  runtimeManifest:
    packages:
      llm-app:
        license: Apache-2.0
        inputs:
          OPENAI_API_KEY: $OPENAI_API_KEY
          OPENAI_MODEL: $OPENAI_MODEL
          BRAND_DISPLAY_NAME: $BRAND_DISPLAY_NAME
        actions:
          chat:
            function: actions/chat/index.ts
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
          recommend:
            function: actions/recommend/index.ts
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
          spotlight:
            function: actions/spotlight/index.ts
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
          mcp:
            function: actions/mcp/index.js
            web: 'yes'
            runtime: nodejs:22
            limits:
              timeout: 300000
              memory: 512
            inputs:
              LOG_LEVEL: debug
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
              raw-http: true
        apis:
          llm-app-api:
            v1:
              chat:
                chat:
                  method: post
                  response: http
              recommend:
                recommend:
                  method: post
                  response: http
              spotlight:
                spotlight:
                  method: post
                  response: http
              mcp:
                mcp:
                  method: post
                  response: http
          llm-app-mcp-get:
            v1:
              mcp:
                mcp:
                  method: get
                  response: http
