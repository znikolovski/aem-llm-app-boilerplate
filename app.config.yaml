application:
  actions: actions
  web: web-src
  # https://developer.adobe.com/app-builder/docs/guides/app_builder_guides/architecture_overview/app_hooks/
  hooks:
    pre-app-build: npm run sync:web-actions-base && npm run clean:web-src-dist
    pre-app-deploy: npm run sync:web-actions-base && npm run clean:web-src-dist
    post-app-build: ./scripts/aio-post-app-build-stage-web-under-package.cjs
    deploy-static: ./scripts/aio-deploy-static-scoped.cjs
  runtimeManifest:
    packages:
      llm-app:
        license: Apache-2.0
        inputs:
          OPENAI_API_KEY: $OPENAI_API_KEY
          OPENAI_MODEL: $OPENAI_MODEL
          BRAND_DISPLAY_NAME: $BRAND_DISPLAY_NAME
          # Optional: single-SPA-at-root — omit when several apps share *.adobeio-static.net (see AGENTS.md).
          LLM_STATIC_WEB_AT_ROOT: $LLM_STATIC_WEB_AT_ROOT
        actions:
          chat:
            function: actions/chat/index.ts
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
          recommend:
            function: actions/recommend/index.ts
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
          spotlight:
            function: actions/spotlight/index.ts
            web: 'yes'
            runtime: nodejs:22
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
          mcp:
            function: actions/mcp/index.js
            web: 'yes'
            runtime: nodejs:22
            limits:
              timeout: 300000
              memory: 512
            inputs:
              LOG_LEVEL: debug
              LLM_APP_BASE_URL: $LLM_APP_BASE_URL
              LLM_EXPERIENCE_ORIGIN: $LLM_EXPERIENCE_ORIGIN
              LLM_APP_OW_PACKAGE: $LLM_APP_OW_PACKAGE
              LLM_CHATGPT_FRAME_DOMAINS: $LLM_CHATGPT_FRAME_DOMAINS
              LLM_EXPERIENCE_USE_HASH_ROUTES: $LLM_EXPERIENCE_USE_HASH_ROUTES
              LLM_SPA_BASENAME: $LLM_SPA_BASENAME
              LLM_EXPERIENCE_DEV_PORT: $LLM_EXPERIENCE_DEV_PORT
              MCP_UI_PROFILE: $MCP_UI_PROFILE
              DISABLE_OPENAI_WIDGET: $DISABLE_OPENAI_WIDGET
            annotations:
              require-adobe-auth: false
              final: true
              web-export: true
              raw-http: true
        apis:
          llm-app-api:
            v1:
              chat:
                chat:
                  method: post
                  response: http
              recommend:
                recommend:
                  method: post
                  response: http
              spotlight:
                spotlight:
                  method: post
                  response: http
              mcp:
                mcp:
                  method: post
                  response: http
          llm-app-mcp-get:
            v1:
              mcp:
                mcp:
                  method: get
                  response: http
